<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ESP32 环境监控面板</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #e9f0f5 0%, #f0f4f8 100%);
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .dashboard {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    .header-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 1.2rem 2rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      border: 1px solid rgba(255,255,255,0.6);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .device-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .device-title i {
      font-size: 2rem;
      color: #2d6a4f;
      background: #d8f3dc;
      padding: 0.7rem;
      border-radius: 1.5rem;
    }
    .device-title h1 {
      font-weight: 600;
      font-size: 1.5rem;
      color: #1e293b;
    }
    .device-subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 2px;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #ffffffcc;
      padding: 0.7rem 1.5rem;
      border-radius: 3rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #9ca3af;
      transition: all 0.3s ease;
    }
    .status-text {
      font-weight: 600;
      color: #334155;
      font-size: 0.95rem;
    }
    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.8rem;
    }
    .prop-card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1.8rem;
      padding: 1.5rem 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.7);
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
    }
    .prop-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.95);
    }
    .prop-card:active {
      transform: scale(0.98);
    }
    .icon-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 0.8rem;
    }
    .prop-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 0.3rem;
    }
    .prop-value {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.2;
    }
    .prop-unit {
      font-size: 0.85rem;
      font-weight: 500;
      color: #64748b;
      margin-left: 2px;
    }
    .hint-text {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 0.5rem;
      opacity: 0.8;
    }
    .weather-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f172a;
      background: linear-gradient(135deg, #ede9fe 0%, #f3e8ff 100%);
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      display: inline-block;
      margin-top: 0.2rem;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15);
    }
    .threshold-section {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 1.8rem;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.8);
    }
    .threshold-section h3 {
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    .threshold-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.2rem;
    }
    .threshold-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .threshold-item label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .input-group {
      display: flex;
      align-items: center;
      background: white;
      border-radius: 2rem;
      padding: 0.3rem 0.3rem 0.3rem 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      border: 1px solid #e2e8f0;
    }
    .input-group input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 0.9rem;
      background: transparent;
      padding: 0.5rem 0;
      min-width: 0;
      color: #1e293b;
    }
    .input-group input::placeholder {
      color: #cbd5e1;
    }
    .input-group button {
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0.5rem 1.2rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .input-group button:hover {
      background: #0f172a;
      transform: scale(1.02);
    }
    .input-group button:active {
      transform: scale(0.97);
    }
    .current-limit {
      font-size: 0.8rem;
      color: #475569;
      font-weight: 500;
      background: #f1f5f9;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
      display: inline-block;
      width: fit-content;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 2rem;
      padding: 1.5rem;
      width: 95%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 50px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .modal-header h3 {
      font-weight: 650;
      color: #1e293b;
      font-size: 1.1rem;
    }
    .close-btn {
      font-size: 1.8rem;
      cursor: pointer;
      color: #64748b;
      line-height: 1;
      transition: color 0.2s;
      padding: 0.5rem;
    }
    .close-btn:hover {
      color: #0f172a;
    }

    /* 时间范围按钮组 */
    .time-range-buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .time-btn {
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      border: 1px solid #e2e8f0;
      background: white;
      color: #64748b;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex: 1;
      min-width: 60px;
      text-align: center;
    }
    .time-btn:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }
    .time-btn.active {
      background: #8b5cf6;
      color: white;
      border-color: #8b5cf6;
      font-weight: 600;
    }

    #historyChart {
      width: 100%;
      height: 350px;
    }
    .refresh-hint {
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 0.5rem;
    }

    /* 天气历史列表样式 */
    .weather-timeline {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 400px;
      overflow-y: auto;
      padding: 0.5rem 0;
    }
    .weather-timeline-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 0.8rem;
      background: #f8fafc;
      border-radius: 1rem;
      border-left: 4px solid #8b5cf6;
      transition: all 0.2s;
    }
    .weather-timeline-item:hover {
      background: #ede9fe;
    }
    .weather-time {
      font-size: 0.8rem;
      color: #64748b;
      min-width: 70px;
      font-weight: 500;
    }
    .weather-text-display {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1e293b;
      flex: 1;
    }
    .weather-original {
      font-size: 0.7rem;
      color: #94a3b8;
    }
    .weather-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .weather-stat-card {
      background: linear-gradient(135deg, #ede9fe 0%, #f3e8ff 100%);
      border-radius: 0.8rem;
      padding: 0.6rem;
      text-align: center;
    }
    .weather-stat-count {
      font-size: 1.3rem;
      font-weight: 700;
      color: #5b21b6;
    }
    .weather-stat-label {
      font-size: 0.7rem;
      color: #7c3aed;
      margin-top: 0.1rem;
    }

    @media (max-width: 600px) {
      body { padding: 0.6rem; }
      .header-card { 
        flex-direction: column; 
        align-items: flex-start; 
        padding: 1rem 1.5rem;
      }
      .prop-value { font-size: 1.7rem; }
      .weather-value { font-size: 1.5rem; }
      .threshold-grid {
        grid-template-columns: 1fr 1fr;
      }
      .modal-content {
        padding: 1rem;
        border-radius: 1.5rem;
        width: 100%;
        max-height: 95vh;
      }
      .weather-timeline-item {
        flex-wrap: wrap;
      }
      .time-btn {
        padding: 0.4rem 0.6rem;
        font-size: 0.75rem;
      }
      #historyChart {
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header-card">
      <div class="device-title">
        <i class="fas fa-microchip"></i>
        <div>
          <h1>ESP32-DHT11</h1>
          <p class="device-subtitle">产品ID: wWiOsg8Q1j</p>
        </div>
      </div>
      <div class="status-badge">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText" class="status-text">检测中...</span>
      </div>
    </div>

    <div class="grid-cards">
      <div class="prop-card" data-identifier="CurrentTemperature" data-name="温度" data-unit="℃" data-color="#f97316" data-type="number">
        <div class="icon-circle" style="background: #fff2e5; color: #f97316;"><i class="fas fa-temperature-high"></i></div>
        <span class="prop-name">温度</span>
        <div><span id="val_CurrentTemperature" class="prop-value">--</span><span class="prop-unit">℃</span></div>
        <span class="hint-text">点击查看历史</span>
      </div>
      <div class="prop-card" data-identifier="CurrentHumidity" data-name="湿度" data-unit="%RH" data-color="#3b82f6" data-type="number">
        <div class="icon-circle" style="background: #e0f2fe; color: #3b82f6;"><i class="fas fa-droplet"></i></div>
        <span class="prop-name">湿度</span>
        <div><span id="val_CurrentHumidity" class="prop-value">--</span><span class="prop-unit">%RH</span></div>
        <span class="hint-text">点击查看历史</span>
      </div>
      <div class="prop-card" data-identifier="OutdoorTemperature" data-name="室外温度" data-unit="℃" data-color="#06b6d4" data-type="number">
        <div class="icon-circle" style="background: #cffafe; color: #06b6d4;"><i class="fas fa-sun"></i></div>
        <span class="prop-name">室外温度</span>
        <div><span id="val_OutdoorTemperature" class="prop-value">--</span><span class="prop-unit">℃</span></div>
        <span class="hint-text">点击查看历史</span>
      </div>
      <div class="prop-card" data-identifier="WeatherCondition" data-name="天气" data-unit="" data-color="#8b5cf6" data-type="string">
        <div class="icon-circle" style="background: #ede9fe; color: #8b5cf6;"><i class="fas fa-cloud-sun"></i></div>
        <span class="prop-name">天气状况</span>
        <div><span id="val_WeatherCondition" class="weather-value">--</span></div>
        <span class="hint-text">点击查看历史</span>
      </div>
    </div>

    <div class="threshold-section">
      <h3><i class="fas fa-sliders-h" style="margin-right: 0.5rem; color: #6366f1;"></i>上下限设置</h3>
      <div class="threshold-grid">
        <div class="threshold-item">
          <label><i class="fas fa-temperature-high" style="color:#f97316;"></i> 温度上限</label>
          <div class="input-group">
            <input type="number" id="input_temp_max" step="0.1" placeholder="输入上限值">
            <button id="btn_temp_max">设置</button>
          </div>
          <span class="current-limit" id="display_temp_max">当前: -- ℃</span>
        </div>
        <div class="threshold-item">
          <label><i class="fas fa-temperature-low" style="color:#0ea5e9;"></i> 温度下限</label>
          <div class="input-group">
            <input type="number" id="input_temp_min" step="0.1" placeholder="输入下限值">
            <button id="btn_temp_min">设置</button>
          </div>
          <span class="current-limit" id="display_temp_min">当前: -- ℃</span>
        </div>
        <div class="threshold-item">
          <label><i class="fas fa-tint" style="color:#3b82f6;"></i> 湿度上限</label>
          <div class="input-group">
            <input type="number" id="input_humi_max" step="0.1" placeholder="输入上限值">
            <button id="btn_humi_max">设置</button>
          </div>
          <span class="current-limit" id="display_humi_max">当前: -- %RH</span>
        </div>
        <div class="threshold-item">
          <label><i class="fas fa-tint" style="color:#6366f1;"></i> 湿度下限</label>
          <div class="input-group">
            <input type="number" id="input_humi_min" step="0.1" placeholder="输入下限值">
            <button id="btn_humi_min">设置</button>
          </div>
          <span class="current-limit" id="display_humi_min">当前: -- %RH</span>
        </div>
      </div>
    </div>

    <p class="refresh-hint">数据每15秒自动刷新 · 点击卡片查看历史数据</p>
  </div>

  <div id="historyModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">历史数据</h3>
        <span class="close-btn" id="closeModalBtn">&times;</span>
      </div>
      <div class="time-range-buttons" id="timeRangeButtons">
        <button class="time-btn" data-hours="1">1小时</button>
        <button class="time-btn" data-hours="3">3小时</button>
        <button class="time-btn" data-hours="6">6小时</button>
        <button class="time-btn active" data-hours="12">12小时</button>
        <button class="time-btn" data-hours="24">24小时</button>
      </div>
      <div id="historyChart"></div>
      <div id="weatherTimeline" class="weather-timeline" style="display:none;"></div>
    </div>
  </div>

  <script>
    (function() {
      const TOKEN = "version=2018-10-31&res=products%2FwWiOsg8Q1j%2Fdevices%2FESP32-DHT11&et=2052911779&method=md5&sign=L4fegFvWPoA4JEr6Xw9tzA%3D%3D";
      const PRODUCT_ID = "wWiOsg8Q1j";
      const DEVICE_NAME = "ESP32-DHT11";
      
      const API = {
        DETAIL: "https://iot-api.heclouds.com/device/detail",
        GET_PROPERTY: "https://iot-api.heclouds.com/thingmodel/query-device-property",
        SET_PROPERTY: "https://iot-api.heclouds.com/thingmodel/set-device-property",
        HISTORY: "https://iot-api.heclouds.com/thingmodel/query-device-property-history"
      };

      const weatherMap = {
        "0": "☀️ 晴", "1": "🌙 晴", "2": "☀️ 晴", "3": "🌙 晴",
        "4": "☁️ 多云", "5": "⛅ 晴间多云", "6": "⛅ 晴间多云",
        "7": "☁️ 大部多云", "8": "☁️ 大部多云", "9": "☁️ 阴",
        "10": "🌧️ 阵雨", "11": "⛈️ 雷阵雨", "12": "🧊 雷阵雨伴有冰雹",
        "13": "🌧️ 小雨", "14": "🌧️ 中雨", "15": "🌧️ 大雨", "16": "🌧️ 暴雨",
        "17": "🌧️ 大暴雨", "18": "🌧️ 特大暴雨", "19": "🧊 冻雨",
        "20": "🌨️ 雨夹雪", "21": "🌨️ 阵雪", "22": "🌨️ 小雪", "23": "🌨️ 中雪",
        "24": "❄️ 大雪", "25": "❄️ 暴雪", "26": "🌫️ 浮尘", "27": "🌫️ 扬沙",
        "28": "🌫️ 沙尘暴", "29": "🌫️ 强沙尘暴", "30": "🌫️ 雾", "31": "🌫️ 霾",
        "32": "💨 风", "33": "💨 大风", "34": "🌀 飓风", "35": "🌀 热带风暴",
        "36": "🌪️ 龙卷风", "37": "🥶 冷", "38": "🥵 热", "99": "❓ 未知",
        "sunny": "☀️ 晴", "clear": "🌙 晴", "fair": "☀️ 晴",
        "cloudy": "☁️ 多云", "partly cloudy": "⛅ 晴间多云",
        "mostly cloudy": "☁️ 大部多云", "overcast": "☁️ 阴",
        "shower": "🌧️ 阵雨", "thundershower": "⛈️ 雷阵雨",
        "thundershower with hail": "🧊 雷阵雨伴有冰雹",
        "light rain": "🌧️ 小雨", "moderate rain": "🌧️ 中雨",
        "heavy rain": "🌧️ 大雨", "storm": "🌧️ 暴雨",
        "heavy storm": "🌧️ 大暴雨", "severe storm": "🌧️ 特大暴雨",
        "ice rain": "🧊 冻雨", "sleet": "🌨️ 雨夹雪",
        "snow flurry": "🌨️ 阵雪", "light snow": "🌨️ 小雪",
        "moderate snow": "🌨️ 中雪", "heavy snow": "❄️ 大雪",
        "snowstorm": "❄️ 暴雪", "dust": "🌫️ 浮尘", "sand": "🌫️ 扬沙",
        "duststorm": "🌫️ 沙尘暴", "sandstorm": "🌫️ 强沙尘暴",
        "foggy": "🌫️ 雾", "haze": "🌫️ 霾", "windy": "💨 风",
        "blustery": "💨 大风", "hurricane": "🌀 飓风",
        "tropical storm": "🌀 热带风暴", "tornado": "🌪️ 龙卷风",
        "cold": "🥶 冷", "hot": "🥵 热", "unknown": "❓ 未知"
      };

      let chartInstance = null;
      let currentHours = 12;
      let currentIdentifier = null;
      let currentName = null;
      let currentUnit = null;
      let currentColor = null;
      let currentDataType = null;

      function formatWeather(code) {
        if (code === undefined || code === null || code === "") return "❓ --";
        const key = String(code).trim();
        if (weatherMap[key]) return weatherMap[key];
        if (weatherMap[key.toLowerCase()]) return weatherMap[key.toLowerCase()];
        return key;
      }

      function sampleData(list, maxPoints = 48) {
        if (list.length <= maxPoints) return list;
        const step = Math.ceil(list.length / maxPoints);
        const sampled = [];
        for (let i = 0; i < list.length; i += step) {
          sampled.push(list[i]);
        }
        if (sampled[sampled.length - 1] !== list[list.length - 1]) {
          sampled.push(list[list.length - 1]);
        }
        return sampled;
      }

      async function fetchDeviceStatus() {
        try {
          const url = `${API.DETAIL}?product_id=${PRODUCT_ID}&device_name=${DEVICE_NAME}`;
          const res = await fetch(url, { headers: { "authorization": TOKEN } });
          const data = await res.json();
          const dot = document.getElementById('statusDot');
          const text = document.getElementById('statusText');
          
          if (data.code === 0 && data.data) {
            const online = data.data.status === 1;
            dot.style.background = online ? '#10b981' : '#9ca3af';
            dot.style.boxShadow = online ? '0 0 10px #10b981' : '0 0 8px #9ca3af';
            text.textContent = online ? '在线' : '离线';
            text.style.color = online ? '#10b981' : '#64748b';
          } else {
            text.textContent = '状态未知';
            text.style.color = '#94a3b8';
          }
        } catch (e) {
          console.error('获取设备状态失败:', e);
          document.getElementById('statusText').textContent = '连接失败';
        }
      }

      async function fetchProperties() {
        try {
          const url = `${API.GET_PROPERTY}?product_id=${PRODUCT_ID}&device_name=${DEVICE_NAME}`;
          const res = await fetch(url, { headers: { "authorization": TOKEN } });
          const json = await res.json();
          
          if (json.code === 0 && Array.isArray(json.data)) {
            const props = json.data;
            
            const sensorMap = {
              'CurrentTemperature': 'val_CurrentTemperature',
              'CurrentHumidity': 'val_CurrentHumidity',
              'OutdoorTemperature': 'val_OutdoorTemperature',
              'WeatherCondition': 'val_WeatherCondition'
            };
            
            const thresholdDisplayMap = {
              'temp_max': 'display_temp_max',
              'temp_min': 'display_temp_min',
              'humi_max': 'display_humi_max',
              'humi_min': 'display_humi_min'
            };
            
            props.forEach(item => {
              const id = item.identifier;
              const value = item.value;
              
              if (sensorMap[id]) {
                const el = document.getElementById(sensorMap[id]);
                if (el) {
                  if (id === 'WeatherCondition') {
                    el.textContent = formatWeather(value);
                  } else {
                    const num = parseFloat(value);
                    el.textContent = isNaN(num) ? value : num.toFixed(1);
                  }
                }
              }
              
              if (thresholdDisplayMap[id]) {
                const displayEl = document.getElementById(thresholdDisplayMap[id]);
                if (displayEl) {
                  const unit = id.includes('temp') ? '℃' : '%RH';
                  const num = parseFloat(value);
                  const displayValue = isNaN(num) ? value : num.toFixed(1);
                  displayEl.textContent = `当前: ${displayValue} ${unit}`;
                }
              }
            });
          }
        } catch (e) {
          console.error('获取属性失败:', e);
        }
      }

      async function setProperty(identifier, value) {
        try {
          const body = {
            product_id: PRODUCT_ID,
            device_name: DEVICE_NAME,
            params: { [identifier]: value }
          };
          
          await fetch(API.SET_PROPERTY, {
            method: "POST",
            headers: {
              "authorization": TOKEN,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
          });
          
          const nameMap = {
            'temp_max': '温度上限', 'temp_min': '温度下限',
            'humi_max': '湿度上限', 'humi_min': '湿度下限'
          };
          alert(`✓ 已执行: ${nameMap[identifier] || identifier} = ${value}`);
          
          setTimeout(() => fetchProperties(), 800);
        } catch (e) {
          console.error('设置失败:', e);
          alert('设置失败，请检查网络连接');
        }
      }

      async function loadHistory(identifier, name, unit, color, dataType, hours) {
        currentIdentifier = identifier;
        currentName = name;
        currentUnit = unit;
        currentColor = color;
        currentDataType = dataType;
        currentHours = hours || currentHours;

        const modal = document.getElementById('historyModal');
        modal.classList.add('active');
        document.getElementById('modalTitle').textContent = `${name} - 历史数据`;

        // 更新时间按钮状态
        document.querySelectorAll('.time-btn').forEach(btn => {
          btn.classList.remove('active');
          if (parseInt(btn.dataset.hours) === currentHours) {
            btn.classList.add('active');
          }
        });

        const chartDiv = document.getElementById('historyChart');
        const weatherDiv = document.getElementById('weatherTimeline');
        
        chartDiv.style.display = 'none';
        weatherDiv.style.display = 'none';
        
        if (chartInstance) {
          chartInstance.dispose();
          chartInstance = null;
        }

        try {
          const now = new Date();
          const endTime = now.getTime();
          const startTime = endTime - (currentHours * 60 * 60 * 1000);
          
          const limit = currentHours <= 6 ? 144 : 288;
          const url = `${API.HISTORY}?product_id=${PRODUCT_ID}&device_name=${DEVICE_NAME}&identifier=${identifier}&start_time=${startTime}&end_time=${endTime}&limit=${limit}`;
          
          const res = await fetch(url, { 
            headers: { "authorization": TOKEN },
            cache: 'no-cache'
          });
          const data = await res.json();
          
          if (data.code !== 0) {
            alert(`获取历史数据失败: ${data.msg || '未知错误'}`);
            return;
          }
          
          if (!data.data || !data.data.list || data.data.list.length === 0) {
            alert('暂无历史数据');
            return;
          }

          let list = [...data.data.list].reverse();
          
          const isWeatherString = (dataType === 'string' || identifier === 'WeatherCondition');
          
          if (isWeatherString) {
            weatherDiv.style.display = 'flex';
            weatherDiv.innerHTML = '';
            
            const weatherStats = {};
            list.forEach(item => {
              const w = formatWeather(item.value);
              weatherStats[w] = (weatherStats[w] || 0) + 1;
            });
            
            const sortedStats = Object.entries(weatherStats).sort((a, b) => b[1] - a[1]);
            
            const statsDiv = document.createElement('div');
            statsDiv.className = 'weather-stats';
            statsDiv.innerHTML = sortedStats.map(([weather, count]) => `
              <div class="weather-stat-card">
                <div class="weather-stat-count">${count}</div>
                <div class="weather-stat-label">${weather}</div>
              </div>
            `).join('');
            weatherDiv.appendChild(statsDiv);
            
            const maxPoints = currentHours <= 3 ? 24 : 48;
            const sampledWeather = sampleData(list, maxPoints);
            
            sampledWeather.forEach(item => {
              const d = new Date(parseInt(item.time));
              const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
              const weather = formatWeather(item.value);
              
              const timelineItem = document.createElement('div');
              timelineItem.className = 'weather-timeline-item';
              timelineItem.innerHTML = `
                <span class="weather-time">${timeStr}</span>
                <span class="weather-text-display">${weather}</span>
                <span class="weather-original">原始: ${item.value}</span>
              `;
              weatherDiv.appendChild(timelineItem);
            });
            
          } else {
            chartDiv.style.display = 'block';
            chartInstance = echarts.init(chartDiv);
            
            const maxPoints = currentHours <= 3 ? 60 : currentHours <= 6 ? 72 : 48;
            const sampledList = sampleData(list, maxPoints);
            
            const times = sampledList.map(item => {
              const d = new Date(parseInt(item.time));
              return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            });
            
            const values = sampledList.map(item => {
              const v = item.value;
              return isNaN(parseFloat(v)) ? v : parseFloat(v);
            });

            const avgValue = (values.reduce((a, b) => a + b, 0) / values.length).toFixed(1);
            const maxValue = Math.max(...values).toFixed(1);
            const minValue = Math.min(...values).toFixed(1);

            const gradientColors = identifier.includes('Temp') 
              ? ['rgba(249,115,22,0.4)', 'rgba(249,115,22,0.02)']
              : ['rgba(59,130,246,0.4)', 'rgba(59,130,246,0.02)'];

            const option = {
              title: {
                text: `平均: ${avgValue}${unit}  最高: ${maxValue}${unit}  最低: ${minValue}${unit}`,
                left: 'center',
                top: 0,
                textStyle: { fontSize: 11, fontWeight: 500, color: '#64748b' }
              },
              tooltip: { 
                trigger: 'axis',
                backgroundColor: 'rgba(255,255,255,0.95)',
                borderColor: '#e2e8f0',
                textStyle: { fontSize: 12, color: '#1e293b' },
                formatter: function(params) {
                  const p = params[0];
                  return `${p.axisValue}<br/>${p.marker} ${p.seriesName}: <strong>${p.value} ${unit}</strong>`;
                }
              },
              grid: { left: '5%', right: '5%', bottom: '5%', top: '15%', containLabel: true },
              xAxis: {
                type: 'category',
                data: times,
                boundaryGap: false,
                axisLine: { lineStyle: { color: '#e2e8f0' } },
                axisTick: { show: false },
                axisLabel: { 
                  fontSize: 10,
                  color: '#94a3b8',
                  interval: Math.max(1, Math.floor(times.length / 8))
                }
              },
              yAxis: {
                type: 'value',
                name: unit,
                nameTextStyle: { fontSize: 10, color: '#94a3b8' },
                axisLabel: {
                  fontSize: 10,
                  color: '#94a3b8',
                  formatter: function(v) { return v.toFixed(1); }
                },
                splitLine: { lineStyle: { color: '#f8fafc', type: 'dashed' } }
              },
              series: [{
                name: name,
                type: 'line',
                data: values,
                smooth: true,
                symbol: 'none',
                lineStyle: { color: color, width: 2 },
                areaStyle: {
                  color: new echarts.graphic.LinearGradient(0,0,0,1,[
                    {offset:0, color: gradientColors[0]},
                    {offset:1, color: gradientColors[1]}
                  ])
                },
                markLine: {
                  silent: true,
                  symbol: 'none',
                  data: [{ yAxis: parseFloat(avgValue), name: '平均' }],
                  lineStyle: { color: '#cbd5e1', type: 'dashed', width: 1 }
                }
              }]
            };
            
            chartInstance.setOption(option, true);
          }
          
        } catch (e) {
          console.error('加载历史数据失败:', e);
          alert('加载历史数据失败，请检查网络连接');
        }
      }

      function bindThresholdButtons() {
        const configs = [
          { btn: 'btn_temp_max', input: 'input_temp_max', id: 'temp_max' },
          { btn: 'btn_temp_min', input: 'input_temp_min', id: 'temp_min' },
          { btn: 'btn_humi_max', input: 'input_humi_max', id: 'humi_max' },
          { btn: 'btn_humi_min', input: 'input_humi_min', id: 'humi_min' }
        ];
        
        configs.forEach(({ btn, input, id }) => {
          document.getElementById(btn).addEventListener('click', () => {
            const inputEl = document.getElementById(input);
            const val = parseFloat(inputEl.value);
            if (isNaN(val)) {
              alert('请输入有效的数值');
              return;
            }
            setProperty(id, val);
            inputEl.value = '';
          });
        });
      }

      function bindCardClicks() {
        document.querySelectorAll('.prop-card').forEach(card => {
          card.addEventListener('click', function() {
            const { identifier, name, unit, color, type } = this.dataset;
            if (identifier) {
              loadHistory(identifier, name, unit, color || '#3b82f6', type);
            }
          });
        });
      }

      function bindTimeRangeButtons() {
        document.querySelectorAll('.time-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const hours = parseInt(this.dataset.hours);
            if (hours === currentHours) return;
            
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            if (currentIdentifier) {
              loadHistory(currentIdentifier, currentName, currentUnit, currentColor, currentDataType, hours);
            }
          });
        });
      }

      function setupModal() {
        const modal = document.getElementById('historyModal');
        
        document.getElementById('closeModalBtn').addEventListener('click', () => {
          modal.classList.remove('active');
          if (chartInstance) {
            chartInstance.dispose();
            chartInstance = null;
          }
          document.getElementById('weatherTimeline').innerHTML = '';
          currentIdentifier = null;
        });
        
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.classList.remove('active');
            if (chartInstance) {
              chartInstance.dispose();
              chartInstance = null;
            }
            document.getElementById('weatherTimeline').innerHTML = '';
            currentIdentifier = null;
          }
        });
        
        window.addEventListener('resize', () => {
          if (chartInstance) chartInstance.resize();
        });
      }

      window.onload = () => {
        fetchDeviceStatus();
        fetchProperties();
        bindThresholdButtons();
        bindCardClicks();
        bindTimeRangeButtons();
        setupModal();

        setInterval(() => {
          fetchDeviceStatus();
          fetchProperties();
        }, 15000);
      };
    })();
  </script>
</body>
</html>
