<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ESP32 环境监控面板</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #e9f0f5 0%, #f0f4f8 100%);
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .dashboard {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    .header-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 1.2rem 2rem;
      box-shadow: 0 20px 35px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      border: 1px solid rgba(255,255,255,0.6);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .device-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .device-title i {
      font-size: 2rem;
      color: #2d6a4f;
      background: #d8f3dc;
      padding: 0.7rem;
      border-radius: 1.5rem;
    }
    .device-title h1 {
      font-weight: 600;
      font-size: 1.5rem;
      color: #1e293b;
    }
    .device-subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 2px;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #ffffffcc;
      padding: 0.7rem 1.5rem;
      border-radius: 3rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #9ca3af;
      transition: all 0.3s ease;
    }
    .status-text {
      font-weight: 600;
      color: #334155;
      font-size: 0.95rem;
    }
    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.8rem;
    }
    .prop-card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1.8rem;
      padding: 1.5rem 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.7);
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
    }
    .prop-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.95);
    }
    .prop-card:active {
      transform: scale(0.98);
    }
    .icon-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 0.8rem;
    }
    .prop-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 0.3rem;
    }
    .prop-value {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.2;
    }
    .prop-unit {
      font-size: 0.85rem;
      font-weight: 500;
      color: #64748b;
      margin-left: 2px;
    }
    .hint-text {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 0.5rem;
      opacity: 0.8;
    }
    .threshold-section {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 1.8rem;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.8);
    }
    .threshold-section h3 {
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    .threshold-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.2rem;
    }
    .threshold-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .threshold-item label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .input-group {
      display: flex;
      align-items: center;
      background: white;
      border-radius: 2rem;
      padding: 0.3rem 0.3rem 0.3rem 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      border: 1px solid #e2e8f0;
    }
    .input-group input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 0.9rem;
      background: transparent;
      padding: 0.5rem 0;
      min-width: 0;
      color: #1e293b;
    }
    .input-group input::placeholder {
      color: #cbd5e1;
    }
    .input-group button {
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0.5rem 1.2rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .input-group button:hover {
      background: #0f172a;
      transform: scale(1.02);
    }
    .input-group button:active {
      transform: scale(0.97);
    }
    .current-limit {
      font-size: 0.8rem;
      color: #475569;
      font-weight: 500;
      background: #f1f5f9;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
      display: inline-block;
      width: fit-content;
    }
    .weather-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0f172a;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 2rem;
      padding: 2rem;
      width: 90%;
      max-width: 700px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 30px 50px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .modal-header h3 {
      font-weight: 650;
      color: #1e293b;
    }
    .close-btn {
      font-size: 1.8rem;
      cursor: pointer;
      color: #64748b;
      line-height: 1;
      transition: color 0.2s;
    }
    .close-btn:hover {
      color: #0f172a;
    }
    #historyChart {
      width: 100%;
      height: 350px;
    }
    .refresh-hint {
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 0.5rem;
    }
    @media (max-width: 600px) {
      body { padding: 0.6rem; }
      .header-card { 
        flex-direction: column; 
        align-items: flex-start; 
        padding: 1rem 1.5rem;
      }
      .prop-value { font-size: 1.7rem; }
      .threshold-grid {
        grid-template-columns: 1fr 1fr;
      }
      .modal-content {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- 头部 -->
    <div class="header-card">
      <div class="device-title">
        <i class="fas fa-microchip"></i>
        <div>
          <h1>ESP32-DHT11</h1>
          <p class="device-subtitle">产品ID: wWiOsg8Q1j</p>
        </div>
      </div>
      <div class="status-badge">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText" class="status-text">检测中...</span>
      </div>
    </div>

    <!-- 属性卡片 -->
    <div class="grid-cards">
      <div class="prop-card" data-identifier="CurrentTemperature" data-name="温度" data-unit="℃" data-color="#f97316" data-type="number">
        <div class="icon-circle" style="background: #fff2e5; color: #f97316;"><i class="fas fa-temperature-high"></i></div>
        <span class="prop-name">温度</span>
        <div><span id="val_CurrentTemperature" class="prop-value">--</span><span class="prop-unit">℃</span></div>
        <span class="hint-text">点击查看历史</span>
      </div>
      <div class="prop-card" data-identifier="CurrentHumidity" data-name="湿度" data-unit="%RH" data-color="#3b82f6" data-type="number">
        <div class="icon-circle" style="background: #e0f2fe; color: #3b82f6;"><i class="fas fa-droplet"></i></div>
        <span class="prop-name">湿度</span>
        <div><span id="val_CurrentHumidity" class="prop-value">--</span><span class="prop-unit">%RH</span></div>
        <span class="hint-text">点击查看历史</span>
      </div>
      <div class="prop-card" data-identifier="OutdoorTemperature" data-name="室外温度" data-unit="℃" data-color="#06b6d4" data-type="number">
        <div class="icon-circle" style="background: #cffafe; color: #06b6d4;"><i class="fas fa-sun"></i></div>
        <span class="prop-name">室外温度</span>
        <div><span id="val_OutdoorTemperature" class="prop-value">--</span><span class="prop-unit">℃</span></div>
        <span class="hint-text">点击查看历史</span>
      </div>
      <div class="prop-card" data-identifier="WeatherCondition" data-name="天气" data-unit="" data-color="#8b5cf6" data-type="string">
        <div class="icon-circle" style="background: #ede9fe; color: #8b5cf6;"><i class="fas fa-cloud-sun"></i></div>
        <span class="prop-name">天气状况</span>
        <div><span id="val_WeatherCondition" class="weather-text">--</span></div>
        <span class="hint-text">点击查看历史</span>
      </div>
    </div>

    <!-- 阈值修改区域 -->
    <div class="threshold-section">
      <h3><i class="fas fa-sliders-h" style="margin-right: 0.5rem; color: #6366f1;"></i>上下限设置</h3>
      <div class="threshold-grid">
        <div class="threshold-item">
          <label><i class="fas fa-temperature-high" style="color:#f97316;"></i> 温度上限</label>
          <div class="input-group">
            <input type="number" id="input_temp_max" step="0.1" placeholder="输入上限值">
            <button id="btn_temp_max">设置</button>
          </div>
          <span class="current-limit" id="display_temp_max">当前: -- ℃</span>
        </div>
        <div class="threshold-item">
          <label><i class="fas fa-temperature-low" style="color:#0ea5e9;"></i> 温度下限</label>
          <div class="input-group">
            <input type="number" id="input_temp_min" step="0.1" placeholder="输入下限值">
            <button id="btn_temp_min">设置</button>
          </div>
          <span class="current-limit" id="display_temp_min">当前: -- ℃</span>
        </div>
        <div class="threshold-item">
          <label><i class="fas fa-tint" style="color:#3b82f6;"></i> 湿度上限</label>
          <div class="input-group">
            <input type="number" id="input_humi_max" step="0.1" placeholder="输入上限值">
            <button id="btn_humi_max">设置</button>
          </div>
          <span class="current-limit" id="display_humi_max">当前: -- %RH</span>
        </div>
        <div class="threshold-item">
          <label><i class="fas fa-tint" style="color:#6366f1;"></i> 湿度下限</label>
          <div class="input-group">
            <input type="number" id="input_humi_min" step="0.1" placeholder="输入下限值">
            <button id="btn_humi_min">设置</button>
          </div>
          <span class="current-limit" id="display_humi_min">当前: -- %RH</span>
        </div>
      </div>
    </div>

    <p class="refresh-hint">数据每15秒自动刷新 · 点击卡片查看历史数据</p>
  </div>

  <!-- 历史数据模态框 -->
  <div id="historyModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">历史数据</h3>
        <span class="close-btn" id="closeModalBtn">&times;</span>
      </div>
      <div id="historyChart"></div>
    </div>
  </div>

  <script>
    (function() {
      const TOKEN = "version=2018-10-31&res=products%2FwWiOsg8Q1j%2Fdevices%2FESP32-DHT11&et=2052911779&method=md5&sign=L4fegFvWPoA4JEr6Xw9tzA%3D%3D";
      const PRODUCT_ID = "wWiOsg8Q1j";
      const DEVICE_NAME = "ESP32-DHT11";
      
      const API = {
        DETAIL: "https://iot-api.heclouds.com/device/detail",
        GET_PROPERTY: "https://iot-api.heclouds.com/thingmodel/query-device-property",
        SET_PROPERTY: "https://iot-api.heclouds.com/thingmodel/set-device-property",
        HISTORY: "https://iot-api.heclouds.com/thingmodel/query-device-property-history"
      };

      const weatherMap = {
        "0": "晴", "1": "晴", "2": "晴", "3": "晴",
        "4": "多云", "5": "晴间多云", "6": "晴间多云",
        "7": "大部多云", "8": "大部多云", "9": "阴",
        "10": "阵雨", "11": "雷阵雨", "12": "雷阵雨伴有冰雹",
        "13": "小雨", "14": "中雨", "15": "大雨", "16": "暴雨",
        "17": "大暴雨", "18": "特大暴雨", "19": "冻雨",
        "20": "雨夹雪", "21": "阵雪", "22": "小雪", "23": "中雪",
        "24": "大雪", "25": "暴雪", "26": "浮尘", "27": "扬沙",
        "28": "沙尘暴", "29": "强沙尘暴", "30": "雾", "31": "霾",
        "32": "风", "33": "大风", "34": "飓风", "35": "热带风暴",
        "36": "龙卷风", "37": "冷", "38": "热", "99": "未知"
      };

      let chartInstance = null;

      function formatWeather(code) {
        if (code === undefined || code === null || code === "") return "--";
        return weatherMap[String(code).trim()] || String(code);
      }

      async function fetchDeviceStatus() {
        try {
          const url = `${API.DETAIL}?product_id=${PRODUCT_ID}&device_name=${DEVICE_NAME}`;
          const res = await fetch(url, { headers: { "authorization": TOKEN } });
          const data = await res.json();
          const dot = document.getElementById('statusDot');
          const text = document.getElementById('statusText');
          
          if (data.code === 0 && data.data) {
            const online = data.data.status === 1;
            dot.style.background = online ? '#10b981' : '#9ca3af';
            dot.style.boxShadow = online ? '0 0 10px #10b981' : '0 0 8px #9ca3af';
            text.textContent = online ? '在线' : '离线';
            text.style.color = online ? '#10b981' : '#64748b';
          } else {
            text.textContent = '状态未知';
            text.style.color = '#94a3b8';
          }
        } catch (e) {
          console.error('获取设备状态失败:', e);
          document.getElementById('statusText').textContent = '连接失败';
        }
      }

      async function fetchProperties() {
        try {
          const url = `${API.GET_PROPERTY}?product_id=${PRODUCT_ID}&device_name=${DEVICE_NAME}`;
          const res = await fetch(url, { headers: { "authorization": TOKEN } });
          const json = await res.json();
          
          if (json.code === 0 && Array.isArray(json.data)) {
            const props = json.data;
            
            const sensorMap = {
              'CurrentTemperature': 'val_CurrentTemperature',
              'CurrentHumidity': 'val_CurrentHumidity',
              'OutdoorTemperature': 'val_OutdoorTemperature',
              'WeatherCondition': 'val_WeatherCondition'
            };
            
            const thresholdDisplayMap = {
              'temp_max': 'display_temp_max',
              'temp_min': 'display_temp_min',
              'humi_max': 'display_humi_max',
              'humi_min': 'display_humi_min'
            };
            
            props.forEach(item => {
              const id = item.identifier;
              const value = item.value;
              
              if (sensorMap[id]) {
                const el = document.getElementById(sensorMap[id]);
                if (el) {
                  if (id === 'WeatherCondition') {
                    el.textContent = formatWeather(value);
                  } else {
                    const num = parseFloat(value);
                    el.textContent = isNaN(num) ? value : num.toFixed(1);
                  }
                }
              }
              
              if (thresholdDisplayMap[id]) {
                const displayEl = document.getElementById(thresholdDisplayMap[id]);
                if (displayEl) {
                  const unit = id.includes('temp') ? '℃' : '%RH';
                  const num = parseFloat(value);
                  const displayValue = isNaN(num) ? value : num.toFixed(1);
                  displayEl.textContent = `当前: ${displayValue} ${unit}`;
                }
              }
            });
          }
        } catch (e) {
          console.error('获取属性失败:', e);
        }
      }

      async function setProperty(identifier, value) {
        try {
          const body = {
            product_id: PRODUCT_ID,
            device_name: DEVICE_NAME,
            params: { [identifier]: value }
          };
          
          await fetch(API.SET_PROPERTY, {
            method: "POST",
            headers: {
              "authorization": TOKEN,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
          });
          
          const nameMap = {
            'temp_max': '温度上限', 'temp_min': '温度下限',
            'humi_max': '湿度上限', 'humi_min': '湿度下限'
          };
          alert(`✓ 已执行: ${nameMap[identifier] || identifier} = ${value}`);
          
          setTimeout(() => fetchProperties(), 800);
        } catch (e) {
          console.error('设置失败:', e);
          alert('设置失败，请检查网络连接');
        }
      }

      async function loadHistory(identifier, name, unit, color, dataType) {
        const modal = document.getElementById('historyModal');
        modal.classList.add('active');
        document.getElementById('modalTitle').textContent = `${name} - 历史数据`;

        if (!chartInstance) {
          chartInstance = echarts.init(document.getElementById('historyChart'));
        }
        chartInstance.showLoading();

        try {
          const now = new Date();
          const endTime = now.getTime();
          const startTime = endTime - (24 * 60 * 60 * 1000);
          
          const url = `${API.HISTORY}?product_id=${PRODUCT_ID}&device_name=${DEVICE_NAME}&identifier=${identifier}&start_time=${startTime}&end_time=${endTime}&limit=288`;
          
          const res = await fetch(url, { 
            headers: { "authorization": TOKEN },
            cache: 'no-cache'
          });
          const data = await res.json();
          
          if (data.code !== 0) {
            alert(`获取历史数据失败: ${data.msg || '未知错误'}`);
            chartInstance.hideLoading();
            return;
          }
          
          if (!data.data || !data.data.list || data.data.list.length === 0) {
            const option = {
              title: {
                text: '暂无数据',
                left: 'center',
                top: 'center',
                textStyle: { color: '#94a3b8', fontSize: 14 }
              },
              xAxis: { show: false },
              yAxis: { show: false },
              series: []
            };
            chartInstance.setOption(option, true);
            chartInstance.hideLoading();
            return;
          }

          let list = [...data.data.list].reverse();
          
          const isWeatherString = (dataType === 'string' || identifier === 'WeatherCondition');
          
          if (isWeatherString) {
            const times = list.map(item => {
              const d = new Date(parseInt(item.time));
              return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            });
            
            const weatherValues = list.map((item, index) => {
              return {
                value: index,
                weather: formatWeather(item.value),
                time: times[index]
              };
            });

            const option = {
              tooltip: {
                trigger: 'item',
                formatter: function(params) {
                  return `${params.data.time}<br/>天气: ${params.data.weather}`;
                }
              },
              grid: { left: '3%', right: '5%', bottom: '10%', top: '15%', containLabel: true },
              xAxis: {
                type: 'category',
                data: times,
                axisLabel: { 
                  rotate: 45, 
                  fontSize: 9,
                  interval: Math.floor(times.length / 10)
                }
              },
              yAxis: {
                type: 'value',
                show: false,
                min: 0,
                max: 10
              },
              series: [{
                name: '天气状况',
                type: 'scatter',
                data: weatherValues,
                symbolSize: 14,
                itemStyle: { 
                  color: color,
                  shadowBlur: 8,
                  shadowColor: color + '40'
                },
                label: {
                  show: true,
                  formatter: function(params) {
                    return params.data.weather;
                  },
                  position: 'top',
                  fontSize: 11,
                  color: '#1e293b',
                  fontWeight: 600,
                  distance: 8
                },
                emphasis: {
                  scale: 1.5,
                  label: {
                    fontSize: 14,
                    fontWeight: 'bold'
                  }
                }
              }]
            };
            
            chartInstance.setOption(option, true);
          } else {
            const times = list.map(item => {
              const d = new Date(parseInt(item.time));
              return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            });
            
            const values = list.map(item => {
              const v = item.value;
              return isNaN(parseFloat(v)) ? v : parseFloat(v);
            });

            const option = {
              tooltip: { 
                trigger: 'axis',
                formatter: function(params) {
                  const p = params[0];
                  return `${p.axisValue}<br/>${p.seriesName}: ${p.value} ${unit}`;
                }
              },
              grid: { left: '8%', right: '5%', bottom: '10%', top: '5%', containLabel: true },
              xAxis: {
                type: 'category',
                data: times,
                axisLabel: { 
                  rotate: 45, 
                  fontSize: 9,
                  interval: Math.floor(times.length / 8)
                }
              },
              yAxis: {
                type: 'value',
                name: unit,
                nameTextStyle: { fontSize: 11 },
                axisLabel: {
                  formatter: function(value) {
                    return value.toFixed(1);
                  }
                }
              },
              dataZoom: [
                {
                  type: 'inside',
                  start: 0,
                  end: 100
                },
                {
                  type: 'slider',
                  start: 0,
                  end: 100,
                  height: 20,
                  bottom: 5
                }
              ],
              series: [{
                name: name,
                type: 'line',
                data: values,
                smooth: true,
                symbol: 'circle',
                symbolSize: 3,
                lineStyle: { color: color, width: 2 },
                areaStyle: {
                  color: new echarts.graphic.LinearGradient(0,0,0,1,[
                    {offset:0, color: color + '40'},
                    {offset:1, color: color + '05'}
                  ])
                },
                markLine: {
                  silent: true,
                  data: [
                    { type: 'average', name: '平均值' }
                  ],
                  lineStyle: { color: '#94a3b8', type: 'dashed' }
                }
              }]
            };
            
            chartInstance.setOption(option, true);
          }
          
          chartInstance.hideLoading();
          
          setTimeout(() => {
            if (chartInstance) chartInstance.resize();
          }, 100);
          
        } catch (e) {
          console.error('加载历史数据失败:', e);
          chartInstance.hideLoading();
          alert('加载历史数据失败，请检查网络连接');
        }
      }

      function bindThresholdButtons() {
        const configs = [
          { btn: 'btn_temp_max', input: 'input_temp_max', id: 'temp_max' },
          { btn: 'btn_temp_min', input: 'input_temp_min', id: 'temp_min' },
          { btn: 'btn_humi_max', input: 'input_humi_max', id: 'humi_max' },
          { btn: 'btn_humi_min', input: 'input_humi_min', id: 'humi_min' }
        ];
        
        configs.forEach(({ btn, input, id }) => {
          document.getElementById(btn).addEventListener('click', () => {
            const inputEl = document.getElementById(input);
            const val = parseFloat(inputEl.value);
            if (isNaN(val)) {
              alert('请输入有效的数值');
              return;
            }
            setProperty(id, val);
            inputEl.value = '';
          });
        });
      }

      function bindCardClicks() {
        document.querySelectorAll('.prop-card').forEach(card => {
          card.addEventListener('click', function() {
            const { identifier, name, unit, color, type } = this.dataset;
            if (identifier) {
              loadHistory(identifier, name, unit, color || '#3b82f6', type);
            }
          });
        });
      }

      function setupModal() {
        const modal = document.getElementById('historyModal');
        
        document.getElementById('closeModalBtn').addEventListener('click', () => {
          modal.classList.remove('active');
          if (chartInstance) {
            chartInstance.dispose();
            chartInstance = null;
          }
        });
        
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.classList.remove('active');
            if (chartInstance) {
              chartInstance.dispose();
              chartInstance = null;
            }
          }
        });
        
        window.addEventListener('resize', () => {
          if (chartInstance) chartInstance.resize();
        });
      }

      window.onload = () => {
        fetchDeviceStatus();
        fetchProperties();
        bindThresholdButtons();
        bindCardClicks();
        setupModal();

        setInterval(() => {
          fetchDeviceStatus();
          fetchProperties();
        }, 15000);
      };
    })();
  </script>
</body>
</html>
