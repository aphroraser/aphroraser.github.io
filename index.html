<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ESP32-DHT11 环境监测面板</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        :root {
            --card-temp: #f97316;
            --card-humi: #0ea5e9;
            --card-outdoor: #8b5cf6;
            --card-weather: #10b981;
            --bg-page: #f0f4f8;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --card-shadow-hover: 0 12px 36px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background: linear-gradient(160deg, #e8eef5 0%, #f0f4f8 30%, #f8fafb 60%, #eef2f7 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 1rem;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部状态栏 */
        .header-card {
            background: #ffffff;
            border-radius: 1.25rem;
            padding: 1rem 1.5rem;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        .header-card:hover {
            box-shadow: var(--card-shadow-hover);
        }
        .device-title-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .device-icon-circle {
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        .device-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1e293b;
            letter-spacing: -0.01em;
        }
        .device-subtitle {
            font-size: 0.78rem;
            color: #94a3b8;
            font-weight: 500;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.4s ease;
            white-space: nowrap;
        }
        .status-badge.online {
            background: #ecfdf5;
            color: #059669;
            border: 1.5px solid #a7f3d0;
        }
        .status-badge.offline {
            background: #fef2f2;
            color: #dc2626;
            border: 1.5px solid #fecaca;
        }
        .status-badge.loading {
            background: #f8fafc;
            color: #64748b;
            border: 1.5px solid #e2e8f0;
        }
        .status-dot {
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse-dot 2s infinite;
        }
        .status-dot.online-dot {
            background: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }
        .status-dot.offline-dot {
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
            animation: none;
        }
        .status-dot.loading-dot {
            background: #94a3b8;
            animation: pulse-dot 1.2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.6);
                opacity: 0.5;
            }
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            margin-top: 1.25rem;
        }
        @media (max-width: 640px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            body {
                padding: 0.5rem;
            }
            .header-card {
                padding: 0.75rem 1rem;
                border-radius: 1rem;
            }
            .device-name {
                font-size: 0.95rem;
            }
            .device-icon-circle {
                width: 2.25rem;
                height: 2.25rem;
                font-size: 1rem;
            }
        }
        @media (max-width: 420px) {
            .cards-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.6rem;
            }
        }

        /* 属性卡片 */
        .property-card {
            background: #ffffff;
            border-radius: 1.25rem;
            padding: 1.25rem 1.1rem;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(0, 0, 0, 0.03);
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .property-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -25%;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            opacity: 0.04;
            transition: all 0.5s ease;
            pointer-events: none;
        }
        .property-card:hover {
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-4px);
            border-color: rgba(0, 0, 0, 0.08);
        }
        .property-card:hover::before {
            opacity: 0.09;
            transform: scale(1.5);
        }
        .property-card:active {
            transform: scale(0.97);
            transition: transform 0.15s ease;
        }
        .card-icon-row {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .card-icon-circle {
            width: 2.6rem;
            height: 2.6rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .property-card:hover .card-icon-circle {
            transform: rotate(-8deg) scale(1.08);
        }
        .card-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
            letter-spacing: -0.01em;
        }
        .card-value-row {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        .card-value {
            font-weight: 800;
            font-size: 2.4rem;
            color: #1e293b;
            letter-spacing: -0.02em;
            line-height: 1;
            transition: color 0.3s ease;
        }
        .card-unit {
            font-weight: 500;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .card-hint {
            font-size: 0.7rem;
            color: #cbd5e1;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
        }
        .property-card:hover .card-hint {
            color: #94a3b8;
        }
        @media (max-width: 640px) {
            .card-value {
                font-size: 1.8rem;
            }
            .card-icon-circle {
                width: 2.2rem;
                height: 2.2rem;
                font-size: 1rem;
            }
            .card-label {
                font-size: 0.78rem;
            }
            .property-card {
                padding: 1rem 0.85rem;
                border-radius: 1rem;
                gap: 0.4rem;
            }
        }

        /* 天气特殊卡片 */
        .weather-card .card-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0d9488;
        }
        @media (max-width: 640px) {
            .weather-card .card-value {
                font-size: 1.2rem;
            }
        }
        .weather-emoji {
            font-size: 2.8rem;
            line-height: 1;
            transition: transform 0.4s ease;
        }
        .property-card:hover .weather-emoji {
            transform: scale(1.2) rotate(5deg);
        }
        @media (max-width: 640px) {
            .weather-emoji {
                font-size: 2rem;
            }
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-dialog {
            background: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 820px;
            max-height: 88vh;
            overflow: auto;
            animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: #fff;
            border-radius: 1.5rem 1.5rem 0 0;
            z-index: 2;
        }
        .modal-title {
            font-weight: 700;
            font-size: 1.15rem;
            color: #1e293b;
        }
        .modal-close-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1.3rem;
            color: #64748b;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .modal-close-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
            transform: rotate(90deg);
        }
        .modal-body {
            padding: 1.5rem;
        }
        .chart-container {
            width: 100%;
            height: 420px;
        }
        @media (max-width: 640px) {
            .chart-container {
                height: 300px;
            }
            .modal-dialog {
                border-radius: 1.25rem;
                max-height: 92vh;
            }
            .modal-header {
                padding: 1rem 1.25rem;
                border-radius: 1.25rem 1.25rem 0 0;
            }
            .modal-body {
                padding: 1rem 0.75rem;
            }
            .modal-title {
                font-size: 1rem;
            }
        }

        /* 天气历史列表 */
        .weather-history-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 420px;
            overflow-y: auto;
        }
        .weather-history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            border-radius: 0.75rem;
            gap: 0.75rem;
            transition: background 0.2s ease;
        }
        .weather-history-item:hover {
            background: #f1f5f9;
        }
        .weather-history-time {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
            white-space: nowrap;
        }
        .weather-history-desc {
            font-weight: 600;
            font-size: 0.9rem;
            color: #0d9488;
            text-align: right;
        }

        /* 刷新提示 */
        .refresh-indicator {
            text-align: center;
            font-size: 0.72rem;
            color: #bcc8d6;
            margin-top: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.03em;
        }
        .refresh-indicator i {
            display: inline-block;
            animation: spin-slow 3s linear infinite;
        }
        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* 隐藏工具类 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="max-w-5xl mx-auto">
        <!-- 头部信息 -->
        <div class="header-card">
            <div class="device-title-group">
                <div class="device-icon-circle">

        </div>
        <span class="card-label">室外温度</span>
    </div>
    <div class="card-value-row">
        <span class="card-value" id="val-outdoor">--</span>
        <span class="card-unit">℃</span>
    </div>
    <span class="card-hint">点击查看历史数据 →</span>
</div>

<!-- 天气状况卡片 -->
<div class="property-card weather-card"
data-identifier="WeatherCondition"
data-name="天气状况"
data-unit=""
data-color="#10b981"
data-type="weather">
<div class="card-icon-row">
    <div class="card-icon-circle" style="background:#ecfdf5; color:#10b981;">
        <i class="fa fa-cloud"></i>
    </div>
    <span class="card-label">天气状况</span>
</div>
<div class="card-value-row" style="align-items:center;">

</div>
<span class="card-hint">点击查看历史数据 →</span>
</div>
</div>

<!-- 底部刷新提示 -->
<div class="refresh-indicator">
    <i class="fa fa-refresh"></i> 数据每10秒自动刷新 · 点击卡片查看24小时历史
</div>
</div>

<!-- 历史数据模态框 -->
<div id="historyModal" class="modal-overlay hidden">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3 id="modalTitle" class="modal-title">历史数据</h3>
            <button id="closeModalBtn" class="modal-close-btn" title="关闭">×</button>
        </div>
        <div class="modal-body" id="modalBody">
            <div id="chartContainer" class="chart-container"></div>
            <div id="weatherListContainer" class="weather-history-list hidden"></div>
            <div id="historyLoading" style="text-align:center;padding:3rem;color:#94a3b8;">

                <p style="margin-top:0.75rem;">加载历史数据中...</p>
            </div>

            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== 配置信息 ====================
        const config = {
            token: "version=2018-10-31&res=products%2FwWiOsg8Q1j%2Fdevices%2FESP32-DHT11&et=2052911779&method=md5&sign=L4fegFvWPoA4JEr6Xw9tzA%3D%3D",
            productId: "wWiOsg8Q1j",
            deviceName: "ESP32-DHT11",
            api: {
                deviceDetail: "https://iot-api.heclouds.com/device/detail",
                getProperty: "https://iot-api.heclouds.com/thingmodel/query-device-property",
                getHistory: "https://iot-api.heclouds.com/thingmodel/query-device-property-history"
            }
        };

        // ==================== 天气代码映射表 ====================
        const weatherCodeMap = {
            0: { zh: '晴', en: 'Sunny', emoji: '☀️' },
            1: { zh: '晴', en: 'Clear', emoji: '🌙' },
            2: { zh: '晴', en: 'Fair', emoji: '☀️' },
            3: { zh: '晴', en: 'Fair', emoji: '🌙' },
            4: { zh: '多云', en: 'Cloudy', emoji: '⛅' },
            5: { zh: '晴间多云', en: 'Partly Cloudy', emoji: '🌤️' },
            6: { zh: '晴间多云', en: 'Partly Cloudy', emoji: '🌤️' },
            7: { zh: '大部多云', en: 'Mostly Cloudy', emoji: '🌥️' },
            8: { zh: '大部多云', en: 'Mostly Cloudy', emoji: '🌥️' },
            9: { zh: '阴', en: 'Overcast', emoji: '☁️' },

            14: { zh: '中雨', en: 'Moderate Rain', emoji: '🌧️' },
            15: { zh: '大雨', en: 'Heavy Rain', emoji: '🌧️' },
            16: { zh: '暴雨', en: 'Storm', emoji: '🌧️' },

            26: { zh: '浮尘', en: 'Dust', emoji: '🌫️' },
            27: { zh: '扬沙', en: 'Sand', emoji: '🌫️' },
            28: { zh: '沙尘暴', en: 'Duststorm', emoji: '🌫️' },
            29: { zh: '强沙尘暴', en: 'Sandstorm', emoji: '🌫️' },
            30: { zh: '雾', en: 'Foggy', emoji: '🌫️' },
            31: { zh: '霾', en: 'Haze', emoji: '🌫️' },
            32: { zh: '风', en: 'Windy', emoji: '💨' },
            33: { zh: '大风', en: 'Blustery', emoji: '💨' },
            34: { zh: '飓风', en: 'Hurricane', emoji: '🌀' },
            35: { zh: '热带风暴', en: 'Tropical Storm', emoji: '🌀' },
            36: { zh: '龙卷风', en: 'Tornado', emoji: '🌪️' },
            37: { zh: '冷', en: 'Cold', emoji: '🥶' },
            38: { zh: '热', en: 'Hot', emoji: '🥵' },
            99: { zh: '未知', en: 'Unknown', emoji: '❓' }
        };

        // 英文名到中文的映射（用于API返回英文名称的情况）
        const weatherEnMap = {};
        for (const [key, val] of Object.entries(weatherCodeMap)) {
            const enLower = val.en.toLowerCase();
            if (!weatherEnMap[enLower]) {
                weatherEnMap[enLower] = val;
            }
        }

        /**
         * 解析天气值，返回 { zh, emoji }
         * 支持数字代码(0-99)和英文名称
         */
        function parseWeather(rawValue) {
            if (rawValue === null || rawValue === undefined || rawValue === '') {
                return { zh: '未知', emoji: '❓' };
            }
            const strVal = String(rawValue).trim();
            // 尝试作为数字解析
            const numVal = parseInt(strVal, 10);
            if (!isNaN(numVal) && weatherCodeMap[numVal]) {
                return weatherCodeMap[numVal];
            }
            // 尝试英文名匹配（忽略大小写）
            const enLower = strVal.toLowerCase();
            if (weatherEnMap[enLower]) {
                return weatherEnMap[enLower];
            }
            // 模糊匹配（包含关系）
            for (const [key, val] of Object.entries(weatherEnMap)) {
                if (enLower.includes(key) || key.includes(enLower)) {
                    return val;
                }
            }
            // 如果本身就是中文，直接返回
            for (const [key, val] of Object.entries(weatherCodeMap)) {
                if (val.zh === strVal) {
                    return val;
                }
            }
            return { zh: strVal, emoji: '🌤️' };
        }

        // ==================== DOM元素缓存 ====================
        const $statusBadge = document.getElementById('statusBadge');
        const $statusDot = document.getElementById('statusDot');
        const $statusText = document.getElementById('statusText');
        const $valTemp = document.getElementById('val-temperature');
        const $valHumidity = document.getElementById('val-humidity');
        const $valOutdoor = document.getElementById('val-outdoor');
        const $valWeather = document.getElementById('val-weather');
        const $weatherEmoji = document.getElementById('weather-emoji');
        const $historyModal = document.getElementById('historyModal');
        const $modalTitle = document.getElementById('modalTitle');
        const $modalBody = document.getElementById('modalBody');
        const $chartContainer = document.getElementById('chartContainer');
        const $weatherListContainer = document.getElementById('weatherListContainer');
        const $historyLoading = document.getElementById('historyLoading');
        const $historyEmpty = document.getElementById('historyEmpty');
        const $closeModalBtn = document.getElementById('closeModalBtn');

        let chartInstance = null;
        let currentModalType = null; // 'number' | 'weather'

        // ==================== API调用函数 ====================
        async function apiGetDeviceStatus() {
            const url = `${config.api.deviceDetail}?product_id=${config.productId}&device_name=${config.deviceName}`;
            const res = await fetch(url, { headers: { "authorization": config.token } });
            const data = await res.json();
            if (data.code === 0 && data.data) {
                return data.data.status === 1;
            }
            throw new Error(data.msg || '获取设备状态失败');
        }

        async function apiGetProperties() {
            const url = `${config.api.getProperty}?product_id=${config.productId}&device_name=${config.deviceName}`;
            const res = await fetch(url, { headers: { "authorization": config.token } });
            const data = await res.json();
            if (data.code === 0 && data.data) {
                return data.data;
            }
            throw new Error(data.msg || '获取属性失败');
        }

        async function apiGetHistory(identifier, startTime, endTime, limit = 100) {
            const url =
                `${config.api.getHistory}?product_id=${config.productId}&device_name=${config.deviceName}&identifier=${identifier}&start_time=${startTime}&end_time=${endTime}&limit=${limit}`;
            const res = await fetch(url, { headers: { "authorization": config.token } });
            const data = await res.json();
            if (data.code === 0 && data.data) {
                return data.data.list || [];
            }
            throw new Error(data.msg || '获取历史数据失败');
        }

        // ==================== UI更新函数 ====================
        function updateStatusUI(isOnline) {
            if (isOnline) {
                $statusBadge.className = 'status-badge online';
                $statusDot.className = 'status-dot online-dot';
                $statusText.textContent = '设备在线';
            } else {
                $statusBadge.className = 'status-badge offline';
                $statusDot.className = 'status-dot offline-dot';
                $statusText.textContent = '设备离线';
            }
        }

        function updatePropertyUI(propertiesList) {
            // 查找各属性值
            const tempItem = propertiesList.find(i => i.identifier === 'CurrentTemperature');
            const humiItem = propertiesList.find(i => i.identifier === 'CurrentHumidity');
            const outdoorItem = propertiesList.find(i => i.identifier === 'OutdoorTemperature');
            const weatherItem = propertiesList.find(i => i.identifier === 'WeatherCondition');

            // 更新温度
            if (tempItem && tempItem.value !== undefined && tempItem.value !== null) {
                $valTemp.textContent = parseFloat(tempItem.value).toFixed(1);
            } else {
                $valTemp.textContent = '--';
            }

            // 更新湿度
            if (humiItem && humiItem.value !== undefined && humiItem.value !== null) {
                $valHumidity.textContent = parseFloat(humiItem.value).toFixed(1);
            } else {
                $valHumidity.textContent = '--';
            }

            // 更新室外温度
            if (outdoorItem && outdoorItem.value !== undefined && outdoorItem.value !== null) {
                $valOutdoor.textContent = parseFloat(outdoorItem.value).toFixed(1);
            } else {
                $valOutdoor.textContent = '--';
            }

            // 更新天气状况
            if (weatherItem && weatherItem.value !== undefined && weatherItem.value !== null && weatherItem.value !==
                '') {
                const weatherInfo = parseWeather(weatherItem.value);
                $valWeather.textContent = weatherInfo.zh;
                $weatherEmoji.textContent = weatherInfo.emoji;
                $valWeather.style.fontSize = ''; // 恢复默认
            } else {
                $valWeather.textContent = '--';
                $weatherEmoji.textContent = '🌤️';
            }
        }

        // ==================== 数据刷新 ====================
        async function refreshAllData() {
            try {
                const isOnline = await apiGetDeviceStatus();
                updateStatusUI(isOnline);
            } catch (err) {
                console.warn('获取设备状态失败:', err.message);
                $statusBadge.className = 'status-badge offline';
                $statusDot.className = 'status-dot offline-dot';
                $statusText.textContent = '状态获取失败';
            }

            try {
                const properties = await apiGetProperties();
                updatePropertyUI(properties);
            } catch (err) {
                console.warn('获取属性失败:', err.message);
            }
        }

        // ==================== 历史数据模态框 ====================
        function showModal(type, identifier, name, unit, color) {
            currentModalType = type;
            $modalTitle.textContent = name + ' 历史数据（近24小时）';
            $historyModal.classList.remove('hidden');
            $historyLoading.classList.remove('hidden');
            $historyEmpty.classList.add('hidden');
            $chartContainer.classList.add('hidden');
            $weatherListContainer.classList.add('hidden');

            // 销毁旧图表实例
            if (chartInstance) {
                chartInstance.dispose();
                chartInstance = null;
            }
            $chartContainer.innerHTML = '';
            $weatherListContainer.innerHTML = '';

            // 加载数据
            const endTime = Date.now();
            const startTime = endTime - 24 * 60 * 60 * 1000;

            apiGetHistory(identifier, startTime, endTime, 100)
                .then((list) => {
                    $historyLoading.classList.add('hidden');
                    if (!list || list.length === 0) {
                        $historyEmpty.classList.remove('hidden');
                        return;
                    }
                    // 反转数据，按时间正序
                    const sortedList = [...list].reverse();

                    if (type === 'weather') {
                        renderWeatherHistory(sortedList);
                    } else {
                        renderChartHistory(sortedList, name, unit, color);
                    }
                })
                .catch((err) => {
                    console.error('获取历史数据失败:', err);
                    $historyLoading.classList.add('hidden');
                    $historyEmpty.classList.remove('hidden');
                    $historyEmpty.innerHTML =
                        '<i class="fa fa-exclamation-triangle fa-3x" style="color:#f59e0b;"></i><p style="margin-top:0.75rem;color:#f59e0b;">加载失败：' +
                        err.message + '</p>';
                });
        }

        function renderChartHistory(sortedList, name, unit, color) {
            $chartContainer.classList.remove('hidden');
            $weatherListContainer.classList.add('hidden');

            const times = sortedList.map(item => {
                const d = new Date(parseInt(item.time));
                return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            });
            const values = sortedList.map(item => {
                const v = item.value;
                return isNaN(v) ? v : parseFloat(v);
            });

            chartInstance = echarts.init($chartContainer);
            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: '#fff',
                    borderColor: '#e2e8f0',
                    textStyle: { color: '#1e293b', fontSize: 13 },
                    boxShadow: '0 4px 16px rgba(0,0,0,0.1)',
                },
                grid: {
                    left: '3%',
                    right: '5%',
                    bottom: '3%',
                    top: '8%',
                    containLabel: true,
                },
                xAxis: {
                    type: 'category',
                    data: times,
                    axisLabel: {
                        rotate: 30,
                        fontSize: 11,
                        color: '#94a3b8',
                        interval: Math.max(Math.floor(times.length / 8), 1),
                    },
                    axisLine: { lineStyle: { color: '#e2e8f0' } },
                    axisTick: { show: false },
                },
                yAxis: {
                    type: 'value',
                    name: unit,
                    nameTextStyle: { color: '#94a3b8', fontSize: 12 },
                    axisLabel: { fontSize: 11, color: '#94a3b8' },
                    splitLine: { lineStyle: { color: '#f1f5f9', type: 'dashed' } },
                },
                series: [{
                    name: name,
                    type: 'line',
                    data: values,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 5,
                    lineStyle: { color: color, width: 2.5 },
                    itemStyle: { color: color },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: color + '40' },
                            { offset: 1, color: color + '05' },
                        ]),
                    },
                }],
            };
            chartInstance.setOption(option, true);

            // 响应式调整
            const resizeHandler = () => { if (chartInstance) chartInstance.resize(); };
            window.addEventListener('resize', resizeHandler);
            // 存储清理函数
            $chartContainer._resizeCleanup = () => window.removeEventListener('resize', resizeHandler);
        }

        function renderWeatherHistory(sortedList) {
            $weatherListContainer.classList.remove('hidden');
            $chartContainer.classList.add('hidden');
            if (chartInstance) {
                chartInstance.dispose();
                chartInstance = null;
            }

            let html = '';
            sortedList.forEach(item => {
                const d = new Date(parseInt(item.time));
                const timeStr =
                    `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                const weatherInfo = parseWeather(item.value);
                html += `
                    <div class="weather-history-item">
                        <span class="weather-history-time">${timeStr}</span>
                        <span class="weather-history-desc">${weatherInfo.emoji} ${weatherInfo.zh}</span>
                    </div>`;
            });
            $weatherListContainer.innerHTML = html;
        }

        function closeModal() {
            $historyModal.classList.add('hidden');
            if ($chartContainer._resizeCleanup) {
                $chartContainer._resizeCleanup();
                $chartContainer._resizeCleanup = null;
            }
            if (chartInstance) {
                chartInstance.dispose();
                chartInstance = null;
            }
            $chartContainer.innerHTML = '';
            $weatherListContainer.innerHTML = '';
            currentModalType = null;
        }

        // ==================== 事件绑定 ====================
        // 属性卡片点击
        document.querySelectorAll('.property-card').forEach(card => {
            card.addEventListener('click', function() {
                const identifier = this.dataset.identifier;
                const name = this.dataset.name;
                const unit = this.dataset.unit;
                const color = this.dataset.color;
                const type = this.dataset.type; // 'number' | 'weather'
                showModal(type, identifier, name, unit, color);
            });
        });

        // 关闭模态框
        $closeModalBtn.addEventListener('click', closeModal);
        $historyModal.addEventListener('click', function(e) {
            if (e.target === $historyModal) {
                closeModal();
            }
        });

        // ESC键关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !$historyModal.classList.contains('hidden')) {
                closeModal();
            }
        });

        // ==================== 初始化 ====================
        function init() {
            refreshAllData();
            // 每10秒刷新
            setInterval(refreshAllData, 10000);
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
